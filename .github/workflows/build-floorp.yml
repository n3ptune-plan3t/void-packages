name: Build Floorp (from my void-packages fork)

on:
  workflow_dispatch:
  push:
    branches: [ floorp ]
    paths:
      - 'srcpkgs/floorp/template'
      - '.github/workflows/build-floorp.yml'
  pull_request:
    branches: [ floorp ]
    paths:
      - 'srcpkgs/floorp/template'
      - '.github/workflows/build-floorp.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/${{ github.repository_owner }}/void-buildroot-glibc:latest

    steps:
      - name: Install required tools
        run: |
          xbps-install -Suy
          # shadow provides useradd; bash and sudo are required for builder setup
          xbps-install -y tar git xtools sudo shadow bash

      - name: Create non-root builder user
        run: |
          # Use absolute path if useradd is not in default PATH
          /usr/sbin/useradd -m -s /bin/bash void-builder
          echo "void-builder ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/void-builder

      - name: Checkout your void-packages fork (floorp branch)
        uses: actions/checkout@v4
        with:
          ref: floorp
          repository: n3ptune-plan3t/void-packages

      - name: Prepare and build Floorp as non-root user
        run: |
          # Ensure the non-root user owns the workspace to run xbps-src
          chown -R void-builder:void-builder $GITHUB_WORKSPACE
          
          # Run build commands as void-builder
          su void-builder -c "
            cd $GITHUB_WORKSPACE
            # Enable fakechroot for building in a container
            echo \"XBPS_CHROOT_CMD=fakechroot\" >> etc/xbps-src.conf
            # Bootstrap the environment
            ./xbps-src binary-bootstrap
            # Build the package
            ./xbps-src -j$(nproc) pkg floorp
          "

      - name: Collect built packages
        run: |
          mkdir -p ./artifacts
          # Find and copy built .xbps files from the hostdir
          find $GITHUB_WORKSPACE/hostdir/binpkgs -name "*.xbps" -exec cp {} ./artifacts/ \; 2>/dev/null || true

      - name: Upload Floorp .xbps artifacts
        uses: actions/upload-artifact@v4
        with:
          name: floorp-xbps-packages
          path: ./artifacts/
          retention-days: 14

      - name: Build summary
        if: always()
        run: |
          echo "=== Built packages ==="
          ls -R ./artifacts 2>/dev/null || echo "No .xbps files found"
