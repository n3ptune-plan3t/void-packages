name: Build Floorp (from my void-packages fork)

on:
  workflow_dispatch:
  push:
    branches: [ floorp ]
    paths:
      - 'srcpkgs/floorp/template'
      - '.github/workflows/build-floorp.yml'
  pull_request:
    branches: [ floorp ]
    paths:
      - 'srcpkgs/floorp/template'
      - '.github/workflows/build-floorp.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/${{ github.repository_owner }}/void-buildroot-glibc:latest

    steps:
      - name: Install required tools (tar, git, etc.)
        run: |
          xbps-install -Suy
          xbps-install -y tar git xtools

      - name: Checkout your void-packages fork (floorp branch)
        uses: actions/checkout@v4
        with:
          ref: floorp
          repository: n3ptune-plan3t/void-packages
          token: ${{ secrets.GITHUB_TOKEN }}   # optional, but safe to keep

      - name: Build Floorp package
        working-directory: /__w/${{ github.event.repository.name }}/${{ github.event.repository.name }}
        run: |
          # Enable fakechroot for GitHub Actions
          echo 'XBPS_CHROOT_CMD=fakechroot' >> etc/xbps-src.conf

          # Bootstrap (fast if image already has base)
          ./xbps-src binary-bootstrap || true

          # Build Floorp
          ./xbps-src -j$(nproc) pkg floorp

      - name: Collect built packages
        run: |
          mkdir -p ./artifacts
          cp /__w/${{ github.event.repository.name }}/${{ github.event.repository.name }}/hostdir/binpkgs/*/*.xbps ./artifacts/ 2>/dev/null || true

      - name: Upload Floorp .xbps artifacts
        uses: actions/upload-artifact@v4
        with:
          name: floorp-xbps-packages
          path: ./artifacts/
          retention-days: 14

      - name: Build summary
        if: always()
        run: |
          echo "=== Built packages ==="
          ls -lh /__w/${{ github.event.repository.name }}/${{ github.event.repository.name }}/hostdir/binpkgs/*/*.xbps 2>/dev/null || echo "No .xbps files found"
